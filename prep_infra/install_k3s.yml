---
- name: Installation de k3s sur la VM Debian
  hosts: k3s_nodes
  become: true
  tasks:
    - name: Mise à jour du cache apt
      apt:
        update_cache: yes

    - name: Installation de curl
      apt:
        name: curl
        state: present

    - name: Téléchargement et exécution du script d'installation k3s
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s # N'exécute pas si k3s est déjà là (idempotence)

    - name: Attendre que le fichier k3s.yaml soit généré
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml

    - name: Vérifier l'état des nœuds avec kubectl
      command: k3s kubectl get node
      register: nodes_output

    - name: Affichage du résultat
      debug:
        msg: "{{ nodes_output.stdout }}"